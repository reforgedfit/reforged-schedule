<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reforged">
<title>Reforged Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: Georgia, serif;
    background: #0c0c18;
    color: #eae8f2;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Header ── */
  #header {
    padding: 52px 16px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(10,10,20,0.92);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  #mode-label {
    font-size: 10px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    margin-bottom: 3px;
    transition: color 0.3s;
  }
  #day-title {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: -0.02em;
    margin-bottom: 2px;
  }
  #day-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.32);
    font-style: italic;
    margin-bottom: 12px;
  }

  /* ── Mode toggle ── */
  #mode-toggle {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 3px;
    margin-bottom: 12px;
    width: fit-content;
  }
  .mode-btn {
    padding: 5px 16px;
    border-radius: 16px;
    border: none;
    font-family: Georgia, serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: rgba(255,255,255,0.4);
  }
  .mode-btn.active-work {
    background: rgba(244,162,97,0.2);
    color: #F4A261;
  }
  .mode-btn.active-off {
    background: rgba(149,213,178,0.18);
    color: #95D5B2;
  }

  /* ── Day tabs ── */
  #day-tabs {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    padding-bottom: 2px;
    margin-bottom: 12px;
    scrollbar-width: none;
  }
  #day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.09);
    background: transparent;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    font-family: Georgia, serif;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .day-tab.today-tab { border-color: rgba(244,162,97,0.28); color: rgba(255,255,255,0.6); }
  .day-tab.active-work { border-color: #F4A261; background: rgba(244,162,97,0.15); color: #F4A261; }
  .day-tab.active-off  { border-color: #95D5B2; background: rgba(149,213,178,0.12); color: #95D5B2; }

  /* ── Progress ── */
  #progress-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 5px;
  }
  #progress-bar-bg {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.35s ease;
    background: linear-gradient(90deg, #F4A261, #FF6B6B);
  }

  /* ── Blocks ── */
  #blocks { max-width: 640px; margin: 0 auto; padding: 14px 14px 0; }

  .block {
    margin-bottom: 9px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.025);
    transition: border-color 0.3s, background 0.3s;
  }
  .block.complete { }

  .block-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 13px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .block-icon {
    width: 32px; height: 32px;
    border-radius: 7px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .block-info { flex: 1; min-width: 0; }
  .block-name {
    font-size: 14px;
    font-weight: bold;
    color: #eae8f2;
    transition: color 0.2s;
    line-height: 1.2;
  }
  .block-time {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.03em;
    margin-left: 7px;
  }
  .block-mini-bar-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 5px;
  }
  .block-mini-bar-bg {
    height: 2px; width: 60px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px; overflow: hidden;
  }
  .block-mini-bar { height: 100%; border-radius: 1px; transition: width 0.3s; }
  .block-count { font-size: 10px; color: rgba(255,255,255,0.28); }
  .block-chevron {
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .block-chevron.open { transform: rotate(180deg); }

  /* ── Expanded ── */
  .block-body {
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 10px 13px 13px;
    display: none;
  }
  .block-body.open { display: block; }
  .block-note {
    font-size: 12px;
    font-style: italic;
    margin-bottom: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    border-left-width: 3px;
    border-left-style: solid;
    line-height: 1.5;
  }

  /* ── Tasks ── */
  .task {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 7px 0;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .task:last-child { border-bottom: none; }
  .task-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 9px;
    font-weight: bold;
    color: #0c0c18;
  }
  .task-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.45;
    color: rgba(255,255,255,0.8);
    transition: color 0.15s;
  }
  .task-text.done {
    color: rgba(255,255,255,0.25);
    text-decoration: line-through;
  }
  .task-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }

  /* ── Legend ── */
  #legend {
    max-width: 640px;
    margin: 18px auto 0;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.01);
  }
  #legend-title {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    margin-bottom: 9px;
  }
  #legend-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .legend-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 12px;
  }
</style>

// ─── State ──────────────────────────────────────────────────────────────────
const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const todayIdx = new Date().getDay();
const todayStr = dayNames[todayIdx];

let mode = "work";
let activeDay = DAYS.includes(todayStr) ? todayStr : "Mon";
let checked = {};
let openBlock = null;

// ─── Render ─────────────────────────────────────────────────────────────────
function getSchedule() { return mode === "work" ? WORK[activeDay] : OFF[activeDay]; }

function countProgress() {
  const s = getSchedule();
  let done = 0, total = 0;
  s.forEach((block, bi) => {
    block.tasks.forEach((_, ti) => {
      total++;
      if (checked[`${mode}-${activeDay}-${bi}-${ti}`]) done++;
    });
  });
  return { done, total };
}

function renderHeader() {
  const accent = mode === "work" ? "#F4A261" : "#95D5B2";
  const modeLabel = mode === "work" ? "Reforged · Daily Command Center" : "Reforged · Day Off Mode";
  const subtitle = mode === "work"
    ? DAY_META.work[activeDay]
    : DAY_META.off[activeDay];

  document.getElementById("mode-label").textContent = modeLabel;
  document.getElementById("mode-label").style.color = accent;
  document.getElementById("day-title").textContent =
    (activeDay === todayStr ? "Today — " : "") + activeDay;
  document.getElementById("day-subtitle").textContent = subtitle;

  // mode buttons
  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.className = "mode-btn";
    if (btn.textContent === "Work Day" && mode === "work") btn.classList.add("active-work");
    if (btn.textContent === "Day Off" && mode === "off") btn.classList.add("active-off");
  });

  // day tabs
  const tabsEl = document.getElementById("day-tabs");
  tabsEl.innerHTML = "";
  DAYS.forEach(d => {
    const btn = document.createElement("button");
    btn.className = "day-tab";
    btn.textContent = d;
    if (d === todayStr) btn.classList.add("today-tab");
    if (d === activeDay) btn.classList.add(mode === "work" ? "active-work" : "active-off");
    btn.onclick = () => { activeDay = d; openBlock = null; render(); };
    tabsEl.appendChild(btn);
  });

  // progress
  const { done, total } = countProgress();
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("progress-text").textContent = `${done} / ${total} tasks`;
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-pct").style.color = pct === 100 ? "#95D5B2" : accent;
  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("progress-bar").style.background =
    mode === "work"
      ? "linear-gradient(90deg,#F4A261,#FF6B6B)"
      : "linear-gradient(90deg,#95D5B2,#4CC9F0)";
}

function renderBlocks() {
  const schedule = getSchedule();
  const container = document.getElementById("blocks");
  container.innerHTML = "";

  schedule.forEach((block, bi) => {
    const doneTasks = block.tasks.filter((_,ti) => checked[`${mode}-${activeDay}-${bi}-${ti}`]).length;
    const total = block.tasks.length;
    const complete = doneTasks === total;
    const isOpen = openBlock === bi;

    const blockEl = document.createElement("div");
    blockEl.className = "block" + (complete ? " complete" : "");
    blockEl.style.border = `1px solid ${complete ? block.color + "55" : "rgba(255,255,255,0.07)"}`;
    blockEl.style.background = complete
      ? `linear-gradient(135deg,${block.color}14,${block.color}07)`
      : "rgba(255,255,255,0.025)";

    // Header
    const header = document.createElement("div");
    header.className = "block-header";
    header.onclick = () => { openBlock = isOpen ? null : bi; renderBlocks(); renderHeader(); };

    const iconEl = document.createElement("div");
    iconEl.className = "block-icon";
    iconEl.style.background = block.color + "1e";
    iconEl.style.border = `1px solid ${block.color}3a`;
    iconEl.textContent = block.icon;

    const infoEl = document.createElement("div");
    infoEl.className = "block-info";
    infoEl.innerHTML = `
      <div>
        <span class="block-name" style="color:${complete ? block.color : "#eae8f2"}">${block.label}</span>
        <span class="block-time">${block.time}</span>
      </div>
      <div class="block-mini-bar-row">
        <div class="block-mini-bar-bg">
          <div class="block-mini-bar" style="width:${total ? (doneTasks/total)*100 : 0}%;background:${block.color}"></div>
        </div>
        <span class="block-count">${doneTasks}/${total}</span>
      </div>`;

    const chevron = document.createElement("span");
    chevron.className = "block-chevron" + (isOpen ? " open" : "");
    chevron.textContent = "▾";

    header.appendChild(iconEl);
    header.appendChild(infoEl);
    header.appendChild(chevron);
    blockEl.appendChild(header);

    // Body
    if (isOpen) {
      const body = document.createElement("div");
      body.className = "block-body open";

      if (block.note) {
        const note = document.createElement("div");
        note.className = "block-note";
        note.style.color = block.color;
        note.style.background = block.color + "10";
        note.style.borderLeftColor = block.color;
        note.textContent = block.note;
        body.appendChild(note);
      }

      block.tasks.forEach((task, ti) => {
        const key = `${mode}-${activeDay}-${bi}-${ti}`;
        const done = !!checked[key];
        const tagColor = TAG_C[task.tag] || "#888";

        const taskEl = document.createElement("div");
        taskEl.className = "task";
        taskEl.onclick = () => {
          checked[key] = !checked[key];
          renderBlocks();
          renderHeader();
        };

        const checkEl = document.createElement("div");
        checkEl.className = "task-check";
        checkEl.style.border = `1.5px solid ${done ? block.color : "rgba(255,255,255,0.18)"}`;
        checkEl.style.background = done ? block.color : "transparent";
        checkEl.textContent = done ? "✓" : "";

        const textEl = document.createElement("span");
        textEl.className = "task-text" + (done ? " done" : "");
        textEl.textContent = task.text;

        const tagEl = document.createElement("span");
        tagEl.className = "task-tag";
        tagEl.style.background = tagColor + "1a";
        tagEl.style.color = tagColor;
        tagEl.style.border = `1px solid ${tagColor}38`;
        tagEl.textContent = task.tag;

        taskEl.appendChild(checkEl);
        taskEl.appendChild(textEl);
        taskEl.appendChild(tagEl);
        body.appendChild(taskEl);
      });

      blockEl.appendChild(body);
    }

    container.appendChild(blockEl);
  });

  // Legend
  const legendTags = document.getElementById("legend-tags");
  legendTags.innerHTML = "";
  Object.entries(TAG_C).forEach(([tag, color]) => {
    const span = document.createElement("span");
    span.className = "legend-tag";
    span.style.background = color + "16";
    span.style.color = color;
    span.style.border = `1px solid ${color}36`;
    span.textContent = tag;
    legendTags.appendChild(span);
  });
}

function render() { renderHeader(); renderBlocks(); }

function setMode(m) { mode = m; openBlock = null; render(); }

// Init
render();
</script>
</body>
</html>
